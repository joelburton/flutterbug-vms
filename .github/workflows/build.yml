  linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install zlib (for scare)
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Toolchain versions
        run: |
          rustc --version
          cargo --version
          cmake --version
          clang --version || gcc --version
          python3 --version

      - name: Build all VMs
        run: ./build.sh

      - name: Smoke test
        run: python3 tests/test_smoke.py

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: flutterbug-vms-linux-x86_64
          path: |
            build/glulxe
            build/git
            build/bocfel
            build/bocfel-noz6
            build/hugo
            build/scare
            build/tads
          if-no-files-found: error
